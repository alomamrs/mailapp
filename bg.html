<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#f6f4f0; }

    /* ── Subtle paper texture via SVG noise ── */
    body::before {
      content:'';
      position:fixed;inset:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity:.45;
      pointer-events:none;
      z-index:10;
    }

    canvas { position:fixed; inset:0; }

    /* ── Floating DocuSign brand elements ── */
    .brand {
      position:fixed;
      top:2.5rem; left:3rem;
      display:flex; align-items:center; gap:.85rem;
      z-index:20;
      animation: fadeSlideDown .9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeSlideDown {
      from { opacity:0; transform:translateY(-16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .ds-logo {
      width:42px; height:42px;
      background: linear-gradient(135deg, #26b5e8, #0a5c96);
      border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      box-shadow: 0 4px 16px rgba(10,92,150,.28);
    }
    .ds-logo svg { width:26px; height:26px; }

    .brand-name {
      font-family:'Playfair Display', serif;
      font-size:1.35rem;
      font-weight:700;
      color:#0a2540;
      letter-spacing:-.01em;
    }
    .brand-tag {
      font-family:'DM Sans', sans-serif;
      font-size:.65rem;
      font-weight:300;
      color:#8a9ab0;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-top:.05rem;
    }

    /* ── Floating document cards ── */
    .doc-card {
      position:fixed;
      background:#fff;
      border-radius:6px;
      box-shadow: 0 8px 40px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.06);
      padding:1.4rem 1.6rem;
      z-index:15;
      animation: floatCard linear infinite;
    }
    .doc-card::before {
      content:'';
      position:absolute; top:0; left:0; right:0;
      height:3px;
      border-radius:6px 6px 0 0;
      background: linear-gradient(90deg, #26b5e8, #0a5c96);
    }

    .doc-line {
      height:6px; border-radius:3px;
      background:#eef0f4; margin-bottom:.55rem;
    }
    .doc-line.short  { width:55%; }
    .doc-line.medium { width:80%; }
    .doc-line.long   { width:100%; }
    .doc-line.accent { background: linear-gradient(90deg,#26b5e8,#0a5c96); width:38%; height:7px; }

    .doc-sig {
      margin-top:1rem;
      padding-top:.85rem;
      border-top:1px dashed #dde2ea;
      display:flex; align-items:center; gap:.6rem;
    }
    .sig-box {
      width:90px; height:26px;
      border:1.5px solid #26b5e8;
      border-radius:3px;
      background:rgba(38,181,232,.05);
      display:flex; align-items:center; justify-content:center;
    }
    .sig-box svg { width:56px; height:16px; }
    .sig-label {
      font-family:'DM Sans',sans-serif;
      font-size:.6rem;
      color:#a0aec0;
      letter-spacing:.05em;
    }

    .doc-stamp {
      position:absolute; top:.9rem; right:1rem;
      width:32px; height:32px;
      border:2px solid rgba(38,181,232,.25);
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
    }
    .doc-stamp svg { width:18px; height:18px; }

    @keyframes floatCard {
      0%   { transform: translateY(0px) rotate(var(--rot)); }
      50%  { transform: translateY(var(--drift)) rotate(var(--rot)); }
      100% { transform: translateY(0px) rotate(var(--rot)); }
    }

    /* Positioned cards */
    .card-1 { width:200px; top:12%; left:5%; --rot:-4deg; --drift:-12px; animation-duration:7s; animation-delay:-1s; opacity:.85; }
    .card-2 { width:180px; top:55%; left:2%; --rot:3deg; --drift:10px; animation-duration:9s; animation-delay:-3s; opacity:.7; }
    .card-3 { width:210px; top:8%; right:4%; --rot:5deg; --drift:-8px; animation-duration:8s; animation-delay:-5s; opacity:.8; }
    .card-4 { width:175px; top:60%; right:3%; --rot:-3deg; --drift:14px; animation-duration:6.5s; animation-delay:-2s; opacity:.75; }
    .card-5 { width:190px; top:38%; left:6%; --rot:2deg; --drift:-10px; animation-duration:10s; animation-delay:-7s; opacity:.6; }

    /* ── Decorative corner seal ── */
    .corner-seal {
      position:fixed; bottom:2.5rem; right:3rem;
      z-index:20;
      opacity:.18;
      animation: fadeSlideDown 1.2s cubic-bezier(.22,1,.36,1) .3s both;
    }
    .corner-seal svg { width:80px; height:80px; }

    /* ── Tagline ── */
    .tagline {
      position:fixed; bottom:2.8rem; left:50%; transform:translateX(-50%);
      z-index:20;
      text-align:center;
      animation: fadeSlideDown 1s cubic-bezier(.22,1,.36,1) .5s both;
    }
    .tagline-text {
      font-family:'DM Sans',sans-serif;
      font-size:.72rem;
      font-weight:300;
      color:#a0aec0;
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    /* ── Diagonal accent lines ── */
    .lines-svg {
      position:fixed; inset:0; width:100%; height:100%;
      z-index:5; pointer-events:none; opacity:.04;
    }
  </style>
</head>
<body>

<!-- Animated gradient canvas -->
<canvas id="c"></canvas>

<!-- Diagonal line texture -->
<svg class="lines-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <defs>
    <pattern id="diag" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#0a2540" stroke-width=".8"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#diag)"/>
</svg>

<!-- Brand -->
<div class="brand">
  <div class="ds-logo">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 10h12a8 8 0 010 16H8V10z" fill="white" opacity=".9"/>
      <path d="M8 10h8a8 8 0 010 16H8" stroke="white" stroke-width="1.5" fill="none" opacity=".4"/>
      <circle cx="26" cy="26" r="5" fill="white" opacity=".3"/>
      <path d="M23 26l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div>
    <div class="brand-name">DocuSign</div>
    <div class="brand-tag">Agreement Cloud</div>
  </div>
</div>

<!-- Floating document cards -->
<div class="doc-card card-1">
  <div class="doc-stamp">
    <svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#26b5e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="doc-line accent"></div>
  <div class="doc-line long" style="margin-top:.8rem"></div>
  <div class="doc-line medium"></div>
  <div class="doc-line short"></div>
  <div class="doc-line long"></div>
  <div class="doc-sig">
    <div class="sig-box">
      <svg viewBox="0 0 56 16" fill="none">
        <path d="M4 12 C8 4, 12 2, 16 8 C20 14, 22 6, 28 8 C34 10, 36 4, 40 6 C44 8, 46 12, 52 10" stroke="#26b5e8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="sig-label">SIGNED</div>
  </div>
</div>

<div class="doc-card card-2">
  <div class="doc-line accent" style="width:50%"></div>
  <div class="doc-line long" style="margin-top:.8rem"></div>
  <div class="doc-line medium"></div>
  <div class="doc-line long"></div>
  <div class="doc-line short"></div>
  <div class="doc-sig">
    <div class="sig-box" style="border-color:#dde2ea; background:rgba(221,226,234,.1)">
      <svg viewBox="0 0 56 16" fill="none">
        <line x1="4" y1="12" x2="52" y2="12" stroke="#c8d0db" stroke-width="1" stroke-dasharray="3 2"/>
      </svg>
    </div>
    <div class="sig-label">PENDING</div>
  </div>
</div>

<div class="doc-card card-3">
  <div class="doc-stamp">
    <svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#26b5e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="doc-line accent" style="width:60%"></div>
  <div class="doc-line long" style="margin-top:.8rem"></div>
  <div class="doc-line short"></div>
  <div class="doc-line medium"></div>
  <div class="doc-line long"></div>
  <div class="doc-line medium"></div>
  <div class="doc-sig">
    <div class="sig-box">
      <svg viewBox="0 0 56 16" fill="none">
        <path d="M4 10 C10 3, 14 14, 20 8 C26 2, 30 12, 36 9 C42 6, 46 13, 52 10" stroke="#26b5e8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="sig-label">COMPLETE</div>
  </div>
</div>

<div class="doc-card card-4">
  <div class="doc-line accent" style="width:45%"></div>
  <div class="doc-line long" style="margin-top:.8rem"></div>
  <div class="doc-line medium"></div>
  <div class="doc-line long"></div>
  <div class="doc-sig">
    <div class="sig-box" style="border-color:#dde2ea; background:rgba(221,226,234,.1)">
      <svg viewBox="0 0 56 16" fill="none">
        <line x1="4" y1="12" x2="52" y2="12" stroke="#c8d0db" stroke-width="1" stroke-dasharray="3 2"/>
      </svg>
    </div>
    <div class="sig-label">AWAITING</div>
  </div>
</div>

<div class="doc-card card-5">
  <div class="doc-line accent" style="width:42%"></div>
  <div class="doc-line long" style="margin-top:.8rem"></div>
  <div class="doc-line short"></div>
  <div class="doc-line medium"></div>
  <div class="doc-sig">
    <div class="sig-box">
      <svg viewBox="0 0 56 16" fill="none">
        <path d="M4 12 C12 2, 18 14, 26 8 C34 2, 40 13, 52 9" stroke="#26b5e8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="sig-label">SIGNED</div>
  </div>
</div>

<!-- Corner seal -->
<div class="corner-seal">
  <svg viewBox="0 0 80 80" fill="none">
    <circle cx="40" cy="40" r="36" stroke="#0a2540" stroke-width="2"/>
    <circle cx="40" cy="40" r="30" stroke="#0a2540" stroke-width=".8" stroke-dasharray="3 2"/>
    <text x="40" y="37" text-anchor="middle" font-family="'Playfair Display',serif" font-size="7" fill="#0a2540" font-weight="700">DOCUSIGN</text>
    <text x="40" y="47" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="5" fill="#0a2540" letter-spacing="2">VERIFIED</text>
    <path d="M28 52l3 3 6-6" stroke="#0a2540" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</div>

<!-- Tagline -->
<div class="tagline">
  <div class="tagline-text">Trusted · Secure · Legally Binding</div>
</div>

<script>
// Soft animated gradient background
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, t = 0;

// Muted blue-grey DocuSign palette
const cols = [
  [246,244,240],  // warm paper
  [240,246,252],  // cool blue-white
  [232,242,250],  // light blue
  [248,248,246],  // off-white
];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Slow-moving gradient blobs
const blobs = [
  { x:.2, y:.2, r:.55, ci:0 },
  { x:.8, y:.15, r:.5, ci:1 },
  { x:.15, y:.8, r:.6, ci:2 },
  { x:.85, y:.75, r:.5, ci:3 },
  { x:.5, y:.5, r:.4, ci:0 },
];

function lerp(a, b, t) { return a + (b-a)*t; }

function draw() {
  t += 0.003;

  // Shift blob positions slightly
  const animated = blobs.map((b, i) => ({
    x: b.x + Math.sin(t + i*1.3) * 0.06,
    y: b.y + Math.cos(t + i*0.9) * 0.06,
    r: b.r,
    ci: b.ci,
  }));

  // Fill base
  ctx.fillStyle = `rgb(246,244,240)`;
  ctx.fillRect(0, 0, W, H);

  // Draw soft gradient blobs
  animated.forEach(b => {
    const gx = b.x * W, gy = b.y * H;
    const gr = Math.max(W, H) * b.r;
    const c  = cols[b.ci];
    const g  = ctx.createRadialGradient(gx, gy, 0, gx, gy, gr);
    g.addColorStop(0,   `rgba(${c[0]},${c[1]},${c[2]},0.55)`);
    g.addColorStop(1,   `rgba(${c[0]},${c[1]},${c[2]},0)`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  });

  // Subtle blue accent in corner
  const accentG = ctx.createRadialGradient(W*.85, H*.1, 0, W*.85, H*.1, W*.4);
  accentG.addColorStop(0, 'rgba(38,181,232,0.08)');
  accentG.addColorStop(1, 'rgba(38,181,232,0)');
  ctx.fillStyle = accentG;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
